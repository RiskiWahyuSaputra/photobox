<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QBOX | Photobox App</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d1b4b'/%3E%3Crect x='4' y='4' width='8' height='6' fill='%2300bfff'/%3E%3Crect x='2' y='6' width='12' height='8' fill='%231a237e'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      .app-container {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 20px;
        padding: 20px;
        max-width: 1400px;
        margin: 0 auto;
        height: 100vh;
      }

      .camera-section {
        display: flex;
        flex-direction: column;
        gap: 20px;
        height: 100%;
      }

      .preview-container {
        flex: 1;
        background: #000;
        position: relative;
        overflow: hidden;
        box-shadow:
          -4px 0 0 0 var(--accent-dark),
          4px 0 0 0 var(--accent-dark),
          0 -4px 0 0 var(--accent-dark),
          0 4px 0 0 var(--accent-dark);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        display: none; /* Hidden, we draw to canvas */
      }

      #overlay-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
      }

      .controls-section {
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
        padding-right: 10px;
      }

      .frame-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .frame-option {
        aspect-ratio: 1;
        background: #111;
        border: 4px solid var(--accent-dark);
        cursor: pointer;
        padding: 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 10px;
        transition: 0.1s steps(2);
      }

      .frame-option.selected {
        border-color: var(--accent-light);
        background: var(--accent-mid);
        box-shadow: 0 0 10px var(--accent-light);
      }

      .layout-grid {
        display: flex;
        gap: 8px;
      }

      .layout-option {
        flex: 1;
        padding: 10px 5px;
        background: #111;
        border: 2px solid var(--accent-dark);
        cursor: pointer;
        text-align: center;
        font-size: 11px;
      }

      .layout-option.selected {
        border-color: var(--accent-light);
        background: var(--accent-mid);
      }

      #countdown {
        position: absolute;
        font-size: 12rem;
        color: var(--accent-light);
        z-index: 30;
        display: none;
        text-shadow: 8px 8px #000;
        pointer-events: none;
      }

      #flash {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 40;
        display: none;
        pointer-events: none;
      }

      .photo-strip-preview {
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 140px;
        background: white;
        padding: 8px;
        box-shadow: 12px 12px 0 #000;
        transform: rotate(-3deg);
        z-index: 50;
        display: none;
        border: 1px solid #ddd;
      }

      .strip-photo {
        width: 100%;
        margin-bottom: 4px;
        background: #eee;
        aspect-ratio: 4/3;
        object-fit: cover;
      }

      /* Mobile Adjustments */
      @media (max-width: 900px) {
        .app-container {
          grid-template-columns: 1fr;
          height: auto;
          padding: 10px;
        }
        .preview-container {
          aspect-ratio: 3/4;
        }
        .photo-strip-preview {
          left: 10px;
          bottom: 10px;
          width: 100px;
        }
      }
    </style>
  </head>
  <body>
    <div class="scanlines"></div>
    <div class="pixel-grid"></div>

    <div class="app-container">
      <section class="camera-section">
        <div class="preview-container pixel-box" id="preview-wrapper">
          <video id="video" autoplay playsinline></video>
          <canvas id="overlay-canvas"></canvas>
          <div id="countdown" class="pixel-font">3</div>
          <div id="flash"></div>

          <div id="loading-overlay" class="status-overlay">
            <div class="pixel-loader"></div>
            <p class="pixel-font">INIT CAMERA...</p>
          </div>

          <div id="error-overlay" class="status-overlay" style="display: none">
            <p class="pixel-font" style="color: #ff4081">ERROR!</p>
            <p style="margin-top: 10px">Camera access denied or not found.</p>
            <button
              onclick="location.reload()"
              class="pixel-button pixel-font"
              style="margin-top: 20px"
            >
              RETRY
            </button>
          </div>
        </div>

        <div class="pixel-box" style="display: flex; gap: 16px">
          <button
            id="capture-btn"
            class="pixel-button pixel-font"
            style="flex: 2; height: 60px; font-size: 1.2rem"
          >
            CAPTURE
          </button>
          <div style="flex: 1; display: flex; flex-direction: column; gap: 8px">
            <button
              id="retake-btn"
              class="pixel-button pixel-font"
              style="font-size: 10px"
            >
              RETAKE
            </button>
            <button
              id="save-btn"
              class="pixel-button pixel-font"
              style="font-size: 10px; background: #e91e63"
            >
              SAVE PNG
            </button>
          </div>
        </div>
      </section>

      <aside class="controls-section">
        <div class="pixel-box">
          <h3
            class="pixel-font"
            style="
              font-size: 10px;
              margin-bottom: 12px;
              color: var(--accent-light);
            "
          >
            1. CHOOSE FRAME
          </h3>
          <div class="frame-grid" id="frame-selector">
            <div class="frame-option selected" data-frame="classic">
              CLASSIC<br />BLACK
            </div>
            <div class="frame-option" data-frame="neon">BLUE<br />NEON</div>
            <div class="frame-option" data-frame="cat">PIXEL<br />CAT</div>
            <div class="frame-option" data-frame="star">STAR<br />PIXEL</div>
            <div class="frame-option" data-frame="gameboy">GAME<br />BOY</div>
            <div class="frame-option" data-frame="official">MARIO<br />PIXEL</div>
          </div>
        </div>

        <div class="pixel-box">
          <h3
            class="pixel-font"
            style="
              font-size: 10px;
              margin-bottom: 12px;
              color: var(--accent-light);
            "
          >
            2. LAYOUT
          </h3>
          <div class="layout-grid">
            <div class="layout-option selected" data-layout="1x1">1X1</div>
            <div class="layout-option" data-layout="2x1">2X1</div>
            <div class="layout-option" data-layout="2x2">2X2</div>
            <div class="layout-option" data-layout="strip">STRIP</div>
          </div>
        </div>

        <div class="pixel-box">
          <h3
            class="pixel-font"
            style="
              font-size: 10px;
              margin-bottom: 12px;
              color: var(--accent-light);
            "
          >
            3. FILTER
          </h3>
          <select
            id="filter-select"
            class="pixel-button"
            style="
              width: 100%;
              font-family: &quot;VT323&quot;;
              text-align: left;
            "
          >
            <option value="none">NORMAL</option>
            <option value="grayscale(100%)">B&W NOIR</option>
            <option value="sepia(100%)">RETRO SEPIA</option>
            <option value="contrast(150%) brightness(110%) saturate(150%)">
              VIVID COLOR
            </option>
            <option
              value="sepia(20%) contrast(120%) brightness(90%) hue-rotate(-10deg)"
            >
              VINTAGE FILM
            </option>
            <option value="invert(100%)">INVERTED</option>
          </select>
        </div>
      </aside>
    </div>

    <div id="photo-strip" class="photo-strip-preview"></div>

    <canvas id="merge-canvas" style="display: none"></canvas>

    <script src="js/app.js"></script>
  </body>
</html>
