<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QBOX | Pixel Photobox</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d1b4b'/%3E%3Crect x='4' y='4' width='8' height='6' fill='%2300bfff'/%3E%3Crect x='2' y='6' width='12' height='8' fill='%231a237e'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }

      .title-glitch {
        font-size: 3rem;
        color: var(--accent-light);
        text-shadow: 4px 4px var(--accent-dark);
        margin-bottom: 20px;
        position: relative;
        animation: glitch 3s infinite steps(2);
      }

      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        10% {
          transform: translate(-4px, 2px);
        }
        20% {
          transform: translate(4px, -2px);
        }
        30% {
          transform: translate(0);
        }
      }

      .tagline {
        font-size: 1.5rem;
        margin-bottom: 40px;
        color: var(--accent-glow);
      }

      .booth-container {
        width: 200px;
        height: 250px;
        background: var(--accent-dark);
        margin-bottom: 40px;
        position: relative;
        box-shadow:
          -8px 0 0 0 #000,
          8px 0 0 0 #000,
          0 -8px 0 0 #000,
          0 8px 0 0 #000;
      }

      .booth-screen {
        width: 80%;
        height: 60%;
        background: #000;
        margin: 10% auto;
        border: 4px solid var(--accent-mid);
        position: relative;
        overflow: hidden;
      }

      .booth-screen::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(transparent, rgba(0, 191, 255, 0.1));
        animation: scan 2s infinite linear;
      }

      @keyframes scan {
        0% {
          top: -100%;
        }
        100% {
          top: 100%;
        }
      }

      .features {
        display: flex;
        justify-content: center;
        gap: 40px;
        padding: 80px 20px;
        flex-wrap: wrap;
      }

      .feature-card {
        width: 280px;
        padding: 30px;
        text-align: center;
      }

      .feature-card h3 {
        font-size: 1rem;
        margin-bottom: 15px;
        color: var(--accent-light);
      }

      .feature-card p {
        font-size: 1.2rem;
        line-height: 1.4;
      }

      footer {
        padding: 40px;
        text-align: center;
        border-top: 4px solid var(--accent-dark);
      }

      .pixel-logo {
        font-size: 0.8rem;
        color: var(--accent-mid);
      }

      /* Mario Animation */
      .mario-walker {
        position: absolute;
        bottom: 20px;
        left: -50px;
        width: 16px;
        height: 16px;
        background: #f00;
        box-shadow:
          4px 0 0 #f00,
          8px 0 0 #f00,
          0 4px 0 #f00,
          4px 4px 0 #ff0,
          8px 4px 0 #ff0,
          12px 4px 0 #f00,
          0 8px 0 #f00,
          4px 8px 0 #f00,
          8px 8px 0 #f00,
          12px 8px 0 #f00,
          4px 12px 0 #00f,
          8px 12px 0 #00f,
          0 16px 0 #00f,
          4px 16px 0 #00f,
          8px 16px 0 #00f,
          12px 16px 0 #00f;
        animation: walk 10s infinite linear;
        z-index: 5;
      }

      @keyframes walk {
        0% {
          left: -50px;
          transform: scaleX(1);
        }
        45% {
          transform: scaleX(1);
        }
        50% {
          left: calc(100% + 50px);
          transform: scaleX(-1);
        }
        95% {
          transform: scaleX(-1);
        }
        100% {
          left: -50px;
          transform: scaleX(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="scanlines"></div>
    <div class="pixel-grid"></div>
    <div class="stars" id="stars-container"></div>
    <div class="mario-walker"></div>

    <main>
      <section class="hero">
        <div class="booth-container">
          <div class="booth-screen"></div>
        </div>
        <h1 class="title-glitch">QBOX</h1>
        <p class="tagline">📸 Capture Your Pixel Moment</p>
        <a href="photobox.html" class="pixel-button pixel-font"
          >START PHOTOBOX</a
        >
      </section>

      <section class="features">
        <div class="feature-card pixel-box">
          <h3>FRAME EDITOR</h3>
          <p>
            Customize your photos with various pixel-style frames in real-time.
          </p>
        </div>
        <div class="feature-card pixel-box">
          <h3>INSTANT SAVE</h3>
          <p>Download your pixel moments immediately after capturing.</p>
        </div>
        <div class="feature-card pixel-box">
          <h3>RETAKE ANYTIME</h3>
          <p>Not happy with the shot? Retake as many times as you want!</p>
        </div>
      </section>
    </main>

    <footer>
      <p class="pixel-font pixel-logo">QBOX</p>
    </footer>

    <script>
      // Generate random stars
      const container = document.getElementById("stars-container");
      for (let i = 0; i < 50; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.setProperty("--duration", Math.random() * 3 + 1 + "s");
        container.appendChild(star);
      }
    </script>
  </body>
</html>
>
